<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pretty Planner</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>✨ Pretty Planner</h1>
        <p class="subtitle">Plan your day like a star 💖</p>

        <div class="input-area">
            <input id="taskInput" placeholder="Add a cute task...">
            <button onclick="addTask()">Add 🌸</button>
        </div>

        <div id="taskList"></div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <p id="message"></p>

    </div>

    <script src="script.js"></script>

</body>

</html>
